<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#ff4d6d">
<title>Music — Simple Player</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#000;--bg2:#14141a;--bg3:#1f1f28;--text:#fff;--text2:#a0a0b0;--accent:#ff4d6d}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);display:flex;flex-direction:column}
header{padding:14px 16px 8px;flex-shrink:0}
h1{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
h1::before{content:'🎵';font-size:1.4rem}
.version{margin-left:auto;font-size:.65rem;background:#4ade80;color:#000;padding:2px 8px;border-radius:10px;font-weight:700}
.search{padding:0 16px 12px;flex-shrink:0}
.search-box{display:flex;gap:8px;align-items:center;background:var(--bg3);border-radius:12px;padding:10px 14px;border:1px solid #2a2a35}
.search-box input{flex:1;background:transparent;border:0;outline:0;color:var(--text);font-size:15px;font-family:inherit}
.search-box input::placeholder{color:var(--text2)}
.search-box button{background:var(--accent);color:#fff;border:0;padding:6px 12px;border-radius:8px;font-weight:600;font-size:.85rem;cursor:pointer}
.chips{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 14px;background:var(--bg3);border:1px solid #2a2a35;border-radius:500px;font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap}
.chip.active{background:var(--accent);border-color:transparent}
main{flex:1;overflow-y:auto;padding:0 16px;-webkit-overflow-scrolling:touch}
main::-webkit-scrollbar{width:4px}
main::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding-bottom:100px}
@media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr)}}
.card{background:var(--bg2);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s}
.card:hover{transform:translateY(-2px)}
.card:active{transform:scale(.97)}
.card-art{width:100%;aspect-ratio:1;background:linear-gradient(135deg,#ff4d6d,#c9184a);position:relative;overflow:hidden}
.card-art img{width:100%;height:100%;object-fit:cover;display:block}
.card-art .play-overlay{position:absolute;bottom:8px;right:8px;width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;border:0;font-size:.95rem;cursor:pointer;opacity:0;transition:all .15s;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.card:hover .play-overlay,.card:focus-within .play-overlay{opacity:1}
.card-info{padding:10px}
.card-title{font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.card-artist{color:var(--text2);font-size:.75rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bg3);padding:10px 16px;display:flex;align-items:center;gap:12px;transform:translateY(100%);transition:transform .25s;z-index:100;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.player.show{transform:translateY(0)}
.player-art{width:48px;height:48px;border-radius:6px;background:linear-gradient(135deg,#ff4d6d,#c9184a);flex-shrink:0;object-fit:cover}
.player-info{flex:1;min-width:0}
.player-title{font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-artist{color:var(--text2);font-size:.72rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-controls{display:flex;align-items:center;gap:8px}
.player-btn{background:transparent;border:0;color:var(--text);width:36px;height:36px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.player-btn.play{background:#fff;color:#000;width:42px;height:42px;font-size:.95rem}
.player-yt{background:#ff0000;color:#fff;border:0;padding:6px 10px;border-radius:6px;font-size:.7rem;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px;flex-shrink:0}
.progress-wrap{position:absolute;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,.1)}
.progress-fill{height:100%;background:var(--accent);width:0;transition:width .2s linear}
.empty{text-align:center;color:var(--text2);padding:60px 20px}
.empty .icon{font-size:3rem;margin-bottom:12px;opacity:.5}
.empty h3{color:#fff;margin-bottom:6px;font-size:1rem}
.empty small{font-size:.8rem;line-height:1.5}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 18px;border-radius:500px;font-weight:600;font-size:.82rem;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.5);max-width:90%;text-align:center}
.toast.show{opacity:1}
.loading{text-align:center;padding:40px;color:var(--text2)}
.section-title{font-size:.7rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;padding:16px 0 8px}
</style>
</head>
<body>
<header>
<h1>Music<span class="version" id="version">v12.0</span></h1>
</header>
<div class="search">
<div class="search-box">
<input id="q" type="search" placeholder="Cari lagu atau artis..." autocomplete="off" inputmode="search">
<button id="searchBtn">Cari</button>
</div>
</div>
<div class="chips" id="chips">
<div class="chip active" data-cat="id-trending">🇮🇩 Trending ID</div>
<div class="chip" data-cat="us-trending">🌍 Trending US</div>
<div class="chip" data-cat="pop">🎵 Pop</div>
<div class="chip" data-cat="hiphop">🎤 Hip-Hop</div>
<div class="chip" data-cat="rnb">🎶 R&B</div>
<div class="chip" data-cat="rock">🎸 Rock</div>
<div class="chip" data-cat="dance">💃 Dance</div>
</div>
<main id="main">
<div class="loading" id="loading">Loading...</div>
</main>

<div class="player" id="player">
<div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
<img class="player-art" id="playerArt" alt="">
<div class="player-info">
<div class="player-title" id="playerTitle">—</div>
<div class="player-artist" id="playerArtist">Pilih lagu</div>
</div>
<div class="player-controls">
<a class="player-yt" id="ytBtn" style="display:none" target="_blank">▶ YT</a>
<button class="player-btn" id="prevBtn" title="Sebelumnya">⏮</button>
<button class="player-btn play" id="playBtn" title="Play/Pause">▶</button>
<button class="player-btn" id="nextBtn" title="Selanjutnya">⏭</button>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const audio = new Audio();
audio.preload = 'metadata';
let currentList = [];
let cur = -1;

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function toast(msg, dur = 2000) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), dur);
}

// === iTunes API ===
// iTunes Search API + RSS feeds — both are CORS-enabled, work globally
const ITUNES_SEARCH = 'https://itunes.apple.com/search';
const ITUNES_RSS = 'https://rss.applemarketingtools.com/api/v2';

// Genre search terms for iTunes (it doesn't have genre-specific charts, so we search popular terms)
const GENRE_SEARCH = {
  'pop': 'top pop hits 2024',
  'hiphop': 'best hip hop songs',
  'rnb': 'best r&b songs',
  'rock': 'top rock songs',
  'dance': 'best dance electronic music',
  'id-trending': 'trending indonesia',
  'us-trending': 'top hits america'
};

function normTrack(t) {
  // iTunes RSS format vs search format differ slightly
  return {
    id: 'it-' + (t.id || t.trackId),
    title: t.name || t.trackName || 'Unknown',
    artist: t.artistName || 'Unknown',
    duration: (t.trackTimeMillis ? t.trackTimeMillis/1000 : 30),
    art: (t.artworkUrl100 || t.artworkUrl60 || '').replace('100x100bb', '300x300bb'),
    preview: t.previewUrl || null,
    link: t.trackViewUrl || t.collectionViewUrl || null
  };
}

async function fetchRSS(region, type = 'most-played') {
  // RSS feeds: rss.applemarketingtools.com/api/v2/{region}/music/{type}/30/songs.json
  const url = `${ITUNES_RSS}/${region}/music/${type}/30/songs.json`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('iTunes RSS ' + r.status);
  const data = await r.json();
  return (data.feed?.results || []).map(normTrack);
}

async function fetchSearch(query) {
  const url = `${ITUNES_SEARCH}?term=${encodeURIComponent(query)}&media=music&entity=song&limit=30`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('iTunes ' + r.status);
  const data = await r.json();
  return (data.results || []).map(normTrack);
}

// === Render ===
function renderTracks(tracks) {
  const main = $('main');
  if (!tracks.length) {
    main.innerHTML = '<div class="empty"><div class="icon">🎵</div><h3>Tidak ada hasil</h3><small>Coba kata kunci lain, atau pilih genre di atas</small></div>';
    return;
  }
  main.innerHTML = '<div class="grid">' + tracks.map((t, i) => `
    <div class="card" data-i="${i}">
      <div class="card-art">
        ${t.art ? `<img src="${esc(t.art)}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
        <button class="play-overlay" data-act="play" data-i="${i}" aria-label="Play">▶</button>
      </div>
      <div class="card-info">
        <div class="card-title">${esc(t.title)}</div>
        <div class="card-artist">${esc(t.artist)}</div>
      </div>
    </div>
  `).join('') + '</div>';
}

// === Playback ===
async function playIndex(i) {
  if (i < 0 || i >= currentList.length) return;
  cur = i;
  const t = currentList[i];

  $('playerArt').src = t.art || '';
  $('playerArt').style.background = t.art ? 'transparent' : 'linear-gradient(135deg,#ff4d6d,#c9184a)';
  $('playerTitle').textContent = t.title;
  $('playerArtist').textContent = t.artist;
  $('player').classList.add('show');
  $('playBtn').textContent = '⏸';

  $('ytBtn').style.display = 'flex';
  $('ytBtn').href = `https://www.youtube.com/results?search_query=${encodeURIComponent(t.title + ' ' + t.artist)}`;

  if (!t.preview) {
    toast('❌ Preview tidak tersedia');
    return;
  }

  audio.src = t.preview;
  try {
    await audio.play();
  } catch (e) {
    if (e.name !== 'NotAllowedError') {
      console.warn('Play failed:', e.message);
      toast('Gagal play — coba klik lagi');
    }
  }
}

function togglePlay() {
  if (cur < 0 && currentList.length) {
    playIndex(0);
    return;
  }
  if (audio.paused) {
    audio.play().catch(() => toast('Tap tombol untuk play'));
    $('playBtn').textContent = '⏸';
  } else {
    audio.pause();
    $('playBtn').textContent = '▶';
  }
}

function next() {
  if (!currentList.length) return;
  if (cur < currentList.length - 1) playIndex(cur + 1);
  else playIndex(0);
}

function prev() {
  if (!currentList.length) return;
  if (cur > 0) playIndex(cur - 1);
  else playIndex(currentList.length - 1);
}

audio.addEventListener('ended', () => { $('playBtn').textContent = '▶'; next(); });
audio.addEventListener('play', () => { $('playBtn').textContent = '⏸'; });
audio.addEventListener('pause', () => { $('playBtn').textContent = '▶'; });
audio.addEventListener('timeupdate', () => {
  if (audio.duration) $('progressFill').style.width = (audio.currentTime / audio.duration * 100) + '%';
});

// === Event handlers ===
$('searchBtn').onclick = doSearch;
$('q').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
$('playBtn').onclick = togglePlay;
$('nextBtn').onclick = next;
$('prevBtn').onclick = prev;

document.getElementById('chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === chip));
  loadCategory(chip.dataset.cat);
});

document.getElementById('main').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const i = parseInt(card.dataset.i);
  if (!isNaN(i)) playIndex(i);
});

async function doSearch() {
  const q = $('q').value.trim();
  if (!q) { toast('Ketik dulu kata kuncinya'); return; }
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  $('main').innerHTML = '<div class="loading">Mencari "' + esc(q) + '"...</div>';
  try {
    currentList = await fetchSearch(q);
    renderTracks(currentList);
  } catch (e) {
    $('main').innerHTML = '<div class="empty"><div class="icon">⚠️</div><h3>Error</h3><small>' + esc(e.message) + '</small></div>';
  }
}

async function loadCategory(cat) {
  $('main').innerHTML = '<div class="loading">Loading ' + esc(cat) + '...</div>';
  try {
    if (cat === 'id-trending') {
      currentList = await fetchRSS('id', 'most-played');
    } else if (cat === 'us-trending') {
      currentList = await fetchRSS('us', 'most-played');
    } else {
      // Genre-based via search
      currentList = await fetchSearch(GENRE_SEARCH[cat] || cat);
    }
    renderTracks(currentList);
  } catch (e) {
    $('main').innerHTML = '<div class="empty"><div class="icon">⚠️</div><h3>Error</h3><small>' + esc(e.message) + '<br>Coba refresh atau pilih kategori lain</small></div>';
  }
}

// === Init ===
loadCategory('id-trending');

window._app = { playIndex, currentList, audio };
</script>
</body>
</html>
