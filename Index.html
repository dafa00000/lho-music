<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify – Web Player</title>
    <style>
        :root {
            --bg-base: #000000;
            --bg-surface: #121212;
            --bg-card: #181818;
            --bg-card-hover: #242424;
            --text-main: #ffffff;
            --text-sub: #a7a7a7;
            --spotify-green: #1ed760;
            --spotify-green-hover: #1fdf64;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-main); display: grid; grid-template-columns: 260px 1fr; height: 100vh; overflow: hidden; }
        
        /* Sidebar Layout */
        .sidebar { background-color: var(--bg-base); padding: 20px; display: flex; flex-direction: column; gap: 24px; border-right: 1px solid #282828; }
        .logo { font-size: 24px; font-weight: bold; color: var(--text-main); display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .logo span { color: var(--spotify-green); }
        .nav-group { display: flex; flex-direction: column; gap: 16px; }
        .menu-item { color: var(--text-sub); text-decoration: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .menu-item:hover, .menu-item.active { color: var(--text-main); }
        .divider { height: 1px; background-color: #282828; margin: 8px 0; }
        .playlist-section { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; flex: 1; }

        /* Main Content View */
        .main-content { background: linear-gradient(to bottom, #1e1e1e, var(--bg-surface)); padding: 24px 32px; overflow-y: auto; padding-bottom: 140px; }
        
        /* Navbar Top Control */
        .top-bar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 32px; position: sticky; top: 0; padding: 8px 0; z-index: 10; }
        .search-container { position: relative; }
        .search-box { background-color: #242424; border: 1px solid transparent; padding: 12px 20px; border-radius: 50px; width: 320px; font-size: 14px; outline: none; color: #fff; transition: 0.2s; }
        .search-box:focus { border-color: #535353; background-color: #2a2a2a; }

        h2 { font-size: 24px; font-weight: 700; margin-bottom: 18px; letter-spacing: -0.5px; }
        
        /* Grid Spotify Style */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 24px; margin-bottom: 40px; }
        .card { background-color: var(--bg-card); padding: 16px; border-radius: 8px; cursor: pointer; transition: background-color 0.3s ease; position: relative; }
        .card:hover { background-color: var(--bg-card-hover); }
        .card-img-wrapper { position: relative; width: 100%; aspect-ratio: 1; margin-bottom: 16px; }
        .card img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        
        /* Hover Play Button ala Spotify */
        .play-btn-hover { position: absolute; bottom: 8px; right: 8px; width: 48px; height: 48px; background-color: var(--spotify-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transform: translateY(8px); transition: 0.3s ease; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
        .card:hover .play-btn-hover { opacity: 1; transform: translateY(0); }
        .play-btn-hover::after { content: ''; display: inline-block; width: 0; height: 0; border-style: solid; border-width: 8px 0 8px 14px; border-color: transparent transparent transparent #000; margin-left: 4px; }

        .card .title { font-size: 16px; font-weight: 700; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card .artist { font-size: 14px; color: var(--text-sub); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 20px; }
        
        /* Download Button Minimalist */
        .btn-download { display: inline-block; margin-top: 12px; font-size: 12px; font-weight: 700; color: var(--text-main); text-decoration: none; border: 1px solid #727272; padding: 6px 12px; border-radius: 50px; transition: 0.2s; }
        .btn-download:hover { border-color: #fff; transform: scale(1.04); }

        /* Spotify Bottom Player Bar */
        .player-bar { grid-column: 1 / -1; background-color: #000000; border-top: 1px solid #121212; height: 90px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; position: fixed; bottom: 0; width: 100%; z-index: 100; }
        .current-track { display: flex; align-items: center; gap: 14px; width: 30%; min-width: 180px; }
        .current-track img { width: 56px; height: 56px; border-radius: 4px; object-fit: cover; }
        .track-info { overflow: hidden; }
        .track-info .title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-info .artist { font-size: 11px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Audio Controller Custom */
        .audio-controls { width: 40%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .timeline-container { display: flex; align-items: center; width: 100%; gap: 8px; color: var(--text-sub); font-size: 11px; }
        .progress-bar { flex: 1; -webkit-appearance: none; appearance: none; background: #4d4d4d; height: 4px; border-radius: 2px; outline: none; cursor: pointer; }
        .progress-bar::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; cursor: pointer; display: none; }
        .progress-bar:hover::-webkit-slider-thumb { display: block; }
        audio { display: none; } 

        /* Custom Play/Pause Buttons bar */
        .control-buttons { display: flex; align-items: center; gap: 24px; }
        .control-icon { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 18px; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .control-icon:hover { color: var(--text-main); }
        .play-trigger { width: 32px; height: 32px; background-color: #fff; color: #000; border-radius: 50%; font-size: 14px; }
        .play-trigger:hover { transform: scale(1.06); color: #000; }

        /* Responsive Mobile Layout */
        @media (max-width: 768px) {
            body { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .main-content { padding: 16px; padding-bottom: 160px; }
            .top-bar { flex-direction: column; align-items: stretch; margin-bottom: 20px; }
            .search-box { width: 100%; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
            .player-bar { flex-direction: column; height: auto; padding: 12px; gap: 12px; }
            .current-track { width: 100%; justify-content: flex-start; }
            .audio-controls { width: 100%; }
            .mobile-hide { display: none; }
        }
    </style>
</head>
<body>

    <!-- Sidebar Menu Khas Spotify -->
    <div class="sidebar">
        <div class="logo" onclick="filterCategory('all')"><span>🎧</span> Spotifree</div>
        <div class="nav-group">
            <a class="menu-item active" id="menu-all" onclick="filterCategory('all')">🏠 Home</a>
            <a class="menu-item" id="menu-pop" onclick="filterCategory('Pop')">🎵 Pop Hits</a>
            <a class="menu-item" id="menu-acc" onclick="filterCategory('Acoustic')">🎸 Acoustic Room</a>
            <a class="menu-item" id="menu-chill" onclick="filterCategory('Chill')">☕ Chill Vibe</a>
        </div>
        <div class="divider"></div>
        <div class="playlist-section">
            <div style="font-size: 12px; color: var(--text-sub); font-weight: bold; letter-spacing: 1px;">PLAYLIST KAMU</div>
            <a class="menu-item" onclick="filterCategory('all')">Semua Lagu Tanpa Login</a>
        </div>
    </div>

    <!-- Main Content Panel -->
    <div class="main-content">
        <div class="top-bar">
            <div class="search-container">
                <input type="text" id="search-input" class="search-box" placeholder="Apa yang ingin kamu dengarkan?">
            </div>
        </div>

        <h2 id="section-title">Koleksi Musik Terbaik</h2>
        <div class="grid" id="playlist-grid"></div>
    </div>

    <!-- Bottom Controller Player Bar -->
    <div class="player-bar">
        <div class="current-track">
            <img id="player-img" src="https://picsum.photos" alt="Cover">
            <div class="track-info">
                <div id="player-title" class="title">Pilih lagu di atas</div>
                <div id="player-artist" class="artist">-</div>
            </div>
        </div>
        
        <div class="audio-controls">
            <div class="control-buttons">
                <button class="control-icon" onclick="playPrevious()">⏮</button>
                <button class="control-icon play-trigger" id="play-btn" onclick="togglePlay()">▶</button>
                <button class="control-icon" onclick="playNext()">⏭</button>
            </div>
            <div class="timeline-container">
                <span id="time-current">0:00</span>
                <input type="range" id="progress-bar" class="progress-bar" value="0" min="0" max="100">
                <span id="time-total">0:00</span>
            </div>
            <audio id="main-audio" src=""></audio>
        </div>
        
        <div class="mobile-hide" style="width: 30%;"></div>
    </div>

    <script>
