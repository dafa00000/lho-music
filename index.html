<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Lho Music</title>
<link rel="manifest" href='data:application/manifest+json;charset=utf-8,{"name":"Lho Music","short_name":"Lho","start_url":".","display":"standalone","background_color":"%230a0a0a","theme_color":"%231db954","icons":[{"src":"data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20192%20192%22%3E%3Crect%20width%3D%22192%22%20height%3D%22192%22%20rx%3D%2240%22%20fill%3D%22%231db954%22%2F%3E%3Cpath%20d%3D%22M60%2070v52a16%2016%200%201%200%208%2013.8V84l44-12v36a16%2016%200%201%200%208%2013.8V58z%22%20fill%3D%22%23000%22%2F%3E%3C%2Fsvg%3E","sizes":"192x192","type":"image/svg+xml","purpose":"any"},{"src":"data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20512%20512%22%3E%3Crect%20width%3D%22512%22%20height%3D%22512%22%20rx%3D%22100%22%20fill%3D%22%231db954%22%2F%3E%3Cpath%20d%3D%22M160%20185v140a42%2042%200%201%200%2020%2036.5V225l118-32v95a42%2042%200%201%200%2020%2036.5V155z%22%20fill%3D%22%23000%22%2F%3E%3C%2Fsvg%3E","sizes":"512x512","type":"image/svg+xml","purpose":"any"}]}'>
<meta name="theme-color" content="#1db954">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;padding:16px;padding-bottom:140px;max-width:640px;margin:0 auto}
h1{font-size:1.4rem;margin-bottom:14px;color:#1db954;display:flex;align-items:center;gap:8px}
h2{font-size:1rem;margin:20px 0 10px;color:#aaa;font-weight:500}
.search{display:flex;gap:8px;margin-bottom:8px}
.search input{flex:1;padding:11px 14px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-size:16px;outline:none}
.search input:focus{border-color:#1db954}
.search button{padding:11px 18px;background:#1db954;border:none;border-radius:8px;color:#000;font-weight:600;cursor:pointer;font-size:15px}
.section{background:#141414;border-radius:12px;padding:6px;margin-bottom:8px}
.track{display:flex;align-items:center;gap:11px;padding:9px;border-radius:8px;cursor:pointer;transition:background .15s}
.track:hover{background:#1f1f1f}
.track img{width:46px;height:46px;border-radius:5px;object-fit:cover;background:#222;flex-shrink:0}
.track-info{flex:1;min-width:0}
.track-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.95rem}
.track-artist{font-size:.8rem;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-actions{display:flex;gap:6px;flex-shrink:0}
.btn-act{background:transparent;border:1px solid #444;color:#ddd;padding:5px 10px;border-radius:14px;cursor:pointer;font-size:.72rem;white-space:nowrap}
.btn-act:hover{border-color:#1db954;color:#1db954}
.btn-act.play{border-color:#1db954;color:#1db954}
.btn-act.del{border-color:#555;color:#888}
.player{position:fixed;bottom:0;left:0;right:0;background:#181818;border-top:1px solid #282828;padding:10px 16px;display:flex;align-items:center;gap:11px;backdrop-filter:blur(10px);z-index:10}
.player-art{width:50px;height:50px;border-radius:5px;object-fit:cover;background:#222;flex-shrink:0}
.player-info{flex:1;min-width:0}
.player-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.92rem}
.player-artist{font-size:.78rem;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-ctrls{display:flex;gap:4px;align-items:center;flex-shrink:0}
.pbtn{background:transparent;border:none;color:#fff;cursor:pointer;font-size:1.1rem;padding:7px;min-width:36px}
.pbtn.play{background:#1db954;color:#000;width:42px;height:42px;border-radius:50%;font-size:1rem}
.progress{flex:1;height:3px;background:#333;border-radius:2px;cursor:pointer;margin-top:4px;position:relative}
.progress-fill{height:100%;background:#1db954;border-radius:2px;width:0;pointer-events:none}
.empty{text-align:center;color:#555;padding:24px;font-size:.88rem}
.tag{display:inline-block;background:#1db95420;color:#1db954;padding:2px 8px;border-radius:10px;font-size:.7rem;margin-left:6px}
.setup{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:14px;margin-bottom:14px;font-size:.85rem;color:#bbb;line-height:1.5}
.setup code{background:#0a0a0a;padding:1px 6px;border-radius:3px;color:#1db954;font-family:monospace;font-size:.82rem}
a{color:#1db954}
</style>
</head>
<body>
<h1>🎵 Lho Music</h1>

<div class="setup" id="setup" hidden>
  <b>Setup:</b> Daftar di <a href="https://developer.jamendo.com/v3.0" target="_blank">developer.jamendo.com</a>, bikin app, copy Client ID, paste di <code>CLIENT_ID</code> di kode HTML (line paling atas script).
</div>

<div class="search">
  <input id="q" placeholder="Search song, artist, genre..." />
  <button id="searchBtn">Cari</button>
</div>
<button id="popularBtn" class="btn-act" style="margin-bottom:14px">🔥 Trending</button>

<h2 id="resultsTitle" hidden>Hasil</h2>
<div id="results"></div>

<h2>Playlist <span class="tag" id="plCount">0</span></h2>
<div id="playlist" class="section"></div>

<div class="player">
  <img id="playerArt" alt="">
  <div class="player-info">
    <div class="player-title" id="playerTitle">Belum ada yang diputar</div>
    <div class="player-artist" id="playerArtist">—</div>
    <div class="progress" id="progress"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div class="player-ctrls">
    <button class="pbtn" id="prevBtn">⏮</button>
    <button class="pbtn play" id="playBtn">▶</button>
    <button class="pbtn" id="nextBtn">⏭</button>
  </div>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
// ============================================================
// CONFIG — paste your Jamendo Client ID here
// Daftar di https://developer.jamendo.com/v3.0 (free, ~2 menit)
// ============================================================
const CLIENT_ID = 'YOUR_JAMENDO_CLIENT_ID';
const API = 'https://api.jamendo.com/v3.0';

// ============================================================
const $ = id => document.getElementById(id);
const audio = $('audio');
const playlist = [];
let cur = -1;

if (CLIENT_ID === 'YOUR_JAMENDO_CLIENT_ID') $('setup').hidden = false;

async function api(path, params = {}) {
  const url = new URL(API + path);
  url.searchParams.set('client_id', CLIENT_ID);
  url.searchParams.set('format', 'json');
  url.searchParams.set('limit', '20');
  url.searchParams.set('audioformat', 'mp32');
  url.searchParams.set('include', 'musicinfo');
  for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
  const r = await fetch(url);
  if (!r.ok) throw new Error('API ' + r.status);
  return r.json();
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function trackHTML(t, showAdd = true) {
  const img = t.album_image || `data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 46 46'%3E%3Crect width='46' height='46' fill='%23222'/%3E%3C/svg%3E`;
  return `
    <div class="track" data-id="${t.id}">
      <img src="${img}" alt="">
      <div class="track-info">
        <div class="track-name">${esc(t.name)}</div>
        <div class="track-artist">${esc(t.artist_name)} ${t.album_name ? '· ' + esc(t.album_name) : ''}</div>
      </div>
      <div class="track-actions">
        ${showAdd ? `<button class="btn-act" data-act="add" data-id="${t.id}">+ Tambah</button>` : ''}
      </div>
    </div>`;
}

function render(target, tracks, showAdd = true) {
  if (!tracks.length) {
    target.innerHTML = '<div class="empty">Tidak ada hasil</div>';
    return;
  }
  target.className = 'section';
  target.innerHTML = tracks.map(t => trackHTML(t, showAdd)).join('');
}

async function search() {
  const q = $('q').value.trim();
  if (!q) return;
  const out = $('results');
  out.innerHTML = '<div class="empty">Mencari...</div>';
  out.className = '';
  try {
    const data = await api('/tracks/', { search: q });
    window._results = data.results || [];
    $('resultsTitle').hidden = false;
    render(out, window._results);
  } catch (e) {
    out.innerHTML = '<div class="empty">Error: ' + esc(e.message) + '<br>Cek Client ID di kode</div>';
  }
}

async function trending() {
  const out = $('results');
  out.innerHTML = '<div class="empty">Loading...</div>';
  out.className = '';
  try {
    const data = await api('/tracks/', { order: 'popularity_week', tags: 'chill' });
    window._results = data.results || [];
    $('resultsTitle').hidden = false;
    $('resultsTitle').textContent = '🔥 Trending minggu ini';
    render(out, window._results);
  } catch (e) {
    out.innerHTML = '<div class="empty">Error: ' + esc(e.message) + '</div>';
  }
}

function addToPlaylist(id) {
  const t = (window._results || []).find(x => x.id === id);
  if (!t || playlist.some(x => x.id === id)) return;
  playlist.push(t);
  renderPlaylist();
}

function removeFromPlaylist(id) {
  const idx = playlist.findIndex(x => x.id === id);
  if (idx === -1) return;
  playlist.splice(idx, 1);
  if (cur === idx) { audio.pause(); audio.src = ''; cur = -1; updatePlayer(); }
  else if (cur > idx) cur--;
  renderPlaylist();
}

function renderPlaylist() {
  const el = $('playlist');
  $('plCount').textContent = playlist.length;
  if (!playlist.length) {
    el.className = '';
    el.innerHTML = '<div class="empty">Cari lagu → klik "+ Tambah" untuk masuk sini</div>';
    return;
  }
  el.className = 'section';
  el.innerHTML = playlist.map((t, i) => `
    <div class="track">
      <img src="${t.album_image || ''}" alt="">
      <div class="track-info">
        <div class="track-name">${i === cur ? '▶ ' : ''}${esc(t.name)}</div>
        <div class="track-artist">${esc(t.artist_name)}</div>
      </div>
      <div class="track-actions">
        <button class="btn-act play" data-pl="play" data-i="${i}">▶</button>
        <button class="btn-act del" data-pl="del" data-id="${t.id}">×</button>
      </div>
    </div>`).join('');
}

function playAt(idx) {
  if (idx < 0 || idx >= playlist.length) return;
  cur = idx;
  audio.src = playlist[idx].audio;
  audio.play().catch(e => console.log(e));
  updatePlayer();
  renderPlaylist();
}

function updatePlayer() {
  const t = playlist[cur];
  $('playerArt').src = t?.album_image || '';
  $('playerTitle').textContent = t?.name || 'Belum ada yang diputar';
  $('playerArtist').textContent = t?.artist_name || '—';
  $('playBtn').textContent = audio.paused || !t ? '▶' : '⏸';
}

// Events
$('searchBtn').onclick = search;
$('popularBtn').onclick = trending;
$('q').onkeydown = e => { if (e.key === 'Enter') search(); };

document.addEventListener('click', e => {
  const btn = e.target.closest('button[data-act], button[data-pl]');
  if (!btn) return;
  if (btn.dataset.act === 'add') addToPlaylist(btn.dataset.id);
  if (btn.dataset.pl === 'play') playAt(+btn.dataset.i);
  if (btn.dataset.pl === 'del') removeFromPlaylist(btn.dataset.id);
});

$('playBtn').onclick = () => {
  if (cur === -1) { if (playlist.length) playAt(0); return; }
  if (audio.paused) audio.play(); else audio.pause();
  updatePlayer();
};
$('prevBtn').onclick = () => { if (cur > 0) playAt(cur - 1); };
$('nextBtn').onclick = () => { if (cur < playlist.length - 1) playAt(cur + 1); };
audio.onended = () => { if (cur < playlist.length - 1) playAt(cur + 1); };
audio.ontimeupdate = () => {
  if (!audio.duration) return;
  $('progressFill').style.width = (audio.currentTime / audio.duration * 100) + '%';
};
$('progress').onclick = e => {
  const r = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
};
audio.onplay = audio.onpause = updatePlayer;

renderPlaylist();
updatePlayer();
</script>
</body>
</html>
